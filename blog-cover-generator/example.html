<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信公众号头图生成器 - 优化版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Poppins:ital,wght@0,400;0,700;0,900;1,800&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            /* 浅色主题变量 */
            --bg-main-light: #ffffff;
            --bg-sub-light: #f8fafc;
            --text-main-light: #0f172a;
            --text-sub-light: #475569;
            --primary-color: #2563eb;
            --accent-color: #ea580c;
            --glass-bg-light: rgba(255, 255, 255, 0.85);
            --border-light: rgba(37, 99, 235, 0.2);
            --grid-color-light: #e2e8f0;

            /* 深色主题变量 */
            --bg-main-dark: #0f172a;
            --bg-sub-dark: #1e293b;
            --text-main-dark: #ffffff;
            --text-sub-dark: #94a3b8;
            --primary-dark: #38bdf8;
            --accent-dark: #f97316;
            --glass-bg-dark: rgba(15, 23, 42, 0.7);
            --border-dark: rgba(56, 189, 248, 0.3);
            --grid-color-dark: #1e293b;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-toggle {
            background-color: #f1f5f9;
            color: #334155;
        }

        .btn-toggle:hover {
            background-color: #e2e8f0;
        }

        .btn-preview {
            background-color: #fff7ed;
            color: var(--accent-color);
            border: 1px solid #ffedd5;
        }

        .btn-preview:hover {
            background-color: #ffedd5;
        }

        .btn-preview.active {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-download {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-download:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        /* 画布主容器 (比例 2.35:1) */
        .cover-wrapper {
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            overflow: hidden;
        }

        .cover-container {
            width: 900px;
            height: 383px;
            position: relative;
            overflow: hidden;
            background-color: var(--bg-main-light);
            transition: background-color 0.3s;
        }

        /* 主题样式控制 */
        .theme-dark {
            background-color: var(--bg-main-dark);
        }

        /* 背景网格 */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 30px 30px;
            background-image:
                linear-gradient(to right, var(--grid-color-light) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color-light) 1px, transparent 1px);
            opacity: 0.6;
            z-index: 1;
        }

        .theme-dark .bg-grid {
            background-image:
                linear-gradient(to right, var(--grid-color-dark) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color-dark) 1px, transparent 1px);
            opacity: 0.8;
        }

        /* 侧边装饰图形 (裁切时会不可见，增加宽屏美感) */
        .decor-wing {
            position: absolute;
            top: 0;
            height: 100%;
            width: 258.5px;
            /* (900-383)/2 */
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
        }

        .decor-wing.left {
            left: 0;
        }

        .decor-wing.right {
            right: 0;
        }

        /* 动态光晕 */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 2;
            opacity: 0.5;
        }

        .glow-1 {
            width: 300px;
            height: 300px;
            background: var(--primary-color);
            top: -100px;
            left: 100px;
        }

        .glow-2 {
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            bottom: -150px;
            right: 50px;
            opacity: 0.3;
        }

        .theme-dark .glow-1 {
            background: var(--primary-dark);
            opacity: 0.4;
        }

        .theme-dark .glow-2 {
            background: var(--accent-dark);
            opacity: 0.2;
        }

        /* --- 核心安全区 (1:1 比例，383x383) --- */
        .safe-zone {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 383px;
            height: 383px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 玻璃拟态中心卡片 */
            background: var(--glass-bg-light);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            /* 圆形视觉焦点 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), inset 0 0 20px rgba(255, 255, 255, 0.5);
            /* html2canvas backdrop-filter 兼容性修复 */
            box-sizing: border-box;
        }

        .theme-dark .safe-zone {
            background: var(--glass-bg-dark);
            border: 1px solid var(--border-dark);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* 核心矢量图形：神经网络/节点 */
        .core-svg {
            position: absolute;
            width: 320px;
            height: 320px;
            z-index: -1;
            animation: pulse 4s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95) rotate(0deg);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.05) rotate(5deg);
                opacity: 1;
            }
        }

        /* 中心排版组 */
        .content-group {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

        .tag-badge {
            background: var(--text-main-light);
            color: var(--bg-main-light);
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 6px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            margin-bottom: -15px;
            /* 与大数字重叠产生层次感 */
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .theme-dark .tag-badge {
            background: var(--primary-dark);
            color: var(--bg-main-dark);
        }

        .huge-number {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 140px;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, var(--primary-color) 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 4px 4px 20px rgba(37, 99, 235, 0.2);
        }

        .theme-dark .huge-number {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #93c5fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 4px 4px 20px rgba(56, 189, 248, 0.3);
        }

        .concept-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-main-light);
            margin: -5px 0 5px 0;
            letter-spacing: 4px;
        }

        .theme-dark .concept-title {
            color: var(--text-main-dark);
        }

        .concept-subtitle {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-sub-light);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
        }

        .theme-dark .concept-subtitle {
            color: var(--text-sub-dark);
        }

        /* --- 裁切预览遮罩 (用于辅助设计，导出时不包含) --- */
        .crop-mask {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            pointer-events: none;
        }

        /* 利用 border 实现中间镂空 */
        .crop-mask-inner {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-left: 258.5px solid rgba(0, 0, 0, 0.7);
            border-right: 258.5px solid rgba(0, 0, 0, 0.7);
        }

        .crop-lines {
            position: absolute;
            left: 258.5px;
            top: 0;
            width: 383px;
            height: 383px;
            border: 2px dashed #fbbf24;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .crop-text {
            color: #fbbf24;
            font-weight: bold;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 12px;
            border-radius: 4px;
        }

        /* 导出状态 */
        .exporting .crop-mask {
            display: none !important;
        }

        .exporting .safe-zone {
            /* 解决部分浏览器在 html2canvas 中 backdrop-filter 失效导致的背景过白问题 */
            background: rgba(255, 255, 255, 0.95);
        }

        .theme-dark.exporting .safe-zone {
            background: rgba(15, 23, 42, 0.95);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: var(--primary-color);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <button class="btn-toggle" onclick="toggleTheme()" id="themeBtn">
            <span>🌙</span> 切换深色
        </button>
        <button class="btn-preview" onclick="toggleCropPreview()" id="previewBtn">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4h16v16H4z M4 12h16 M12 4v16"></path>
            </svg>
            1:1 裁切预览
        </button>
        <button class="btn-download" onclick="downloadImage()">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
            </svg>
            下载超清原图
        </button>
    </div>

    <div class="cover-wrapper">
        <div class="cover-container theme-light" id="coverCanvas">
            <!-- 基础背景与光晕 -->
            <div class="bg-grid"></div>
            <div class="glow glow-1"></div>
            <div class="glow glow-2"></div>

            <!-- 两侧装饰元素 (仅在大图可见，提供科技感氛围) -->
            <div class="decor-wing left">
                <svg width="150" height="200" viewBox="0 0 150 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="50" r="3" fill="var(--primary-color)" />
                    <circle cx="20" cy="150" r="3" fill="var(--primary-color)" />
                    <path d="M 20 50 L 80 50 L 120 90 L 150 90" stroke="var(--text-sub-light)" stroke-width="1"
                        stroke-dasharray="4 4" />
                    <path d="M 20 150 L 60 150 L 100 110 L 150 110" stroke="var(--text-sub-light)" stroke-width="1"
                        stroke-dasharray="4 4" />
                    <rect x="10" y="80" width="4" height="40" fill="var(--accent-color)" opacity="0.5" />
                </svg>
            </div>
            <div class="decor-wing right">
                <svg width="150" height="200" viewBox="0 0 150 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="130" cy="80" r="4" fill="var(--primary-color)" />
                    <circle cx="130" cy="120" r="4" fill="var(--accent-color)" />
                    <path d="M 130 80 L 80 80 L 40 40 L 0 40" stroke="var(--text-sub-light)" stroke-width="1"
                        stroke-dasharray="4 4" />
                    <path d="M 130 120 L 90 120 L 50 160 L 0 160" stroke="var(--text-sub-light)" stroke-width="1"
                        stroke-dasharray="4 4" />
                </svg>
            </div>

            <!-- 核心安全区 383x383 -->
            <div class="safe-zone">
                <!-- 抽象 5 节点连线矢量图 -->
                <svg class="core-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="90" stroke="var(--primary-color)" stroke-width="1"
                        stroke-dasharray="2 6" opacity="0.3" />
                    <circle cx="100" cy="100" r="65" stroke="var(--accent-color)" stroke-width="1" opacity="0.1" />

                    <!-- 5个节点连线中心 -->
                    <path d="M100 100 L100 20" stroke="var(--primary-color)" stroke-width="2" opacity="0.2" />
                    <path d="M100 100 L176 75" stroke="var(--primary-color)" stroke-width="2" opacity="0.2" />
                    <path d="M100 100 L147 165" stroke="var(--primary-color)" stroke-width="2" opacity="0.2" />
                    <path d="M100 100 L53 165" stroke="var(--primary-color)" stroke-width="2" opacity="0.2" />
                    <path d="M100 100 L24 75" stroke="var(--primary-color)" stroke-width="2" opacity="0.2" />

                    <!-- 5个节点圆圈 -->
                    <circle cx="100" cy="20" r="6" fill="var(--bg-main-light)" stroke="var(--primary-color)"
                        stroke-width="3" />
                    <circle cx="176" cy="75" r="5" fill="var(--primary-color)" />
                    <circle cx="147" cy="165" r="5" fill="var(--accent-color)" />
                    <circle cx="53" cy="165" r="5" fill="var(--primary-color)" />
                    <circle cx="24" cy="75" r="6" fill="var(--bg-main-light)" stroke="var(--accent-color)"
                        stroke-width="2" />
                </svg>

                <!-- 核心文字组 (提炼视觉概念，避免与长标题重复) -->
                <div class="content-group">
                    <div class="tag-badge">AI-Native PM</div>
                    <div class="huge-number">5</div>
                    <div class="concept-title">核心修炼</div>
                    <div class="concept-subtitle">Evolution Model</div>
                </div>
            </div>

            <!-- 裁切预览遮罩层 -->
            <div class="crop-mask" id="cropMask">
                <div class="crop-mask-inner"></div>
                <div class="crop-lines">
                    <span class="crop-text">朋友圈 / 转发卡片可见区</span>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div style="font-weight: 600; font-size: 18px;">正在渲染超清图像...</div>
        <div style="font-size: 14px; color: #64748b; margin-top: 8px;">确保 100% 无损画质导出</div>
    </div>

    <script>
        let isDark = false;
        let isPreviewOn = false;

        function toggleTheme() {
            const canvas = document.getElementById('coverCanvas');
            const btn = document.getElementById('themeBtn');
            isDark = !isDark;

            if (isDark) {
                canvas.classList.remove('theme-light');
                canvas.classList.add('theme-dark');
                btn.innerHTML = '<span>☀️</span> 切换浅色';
                // 动态更新部分 SVG 内联颜色变量，确保在深色模式下线条可见
                document.documentElement.style.setProperty('--bg-main-light', '#0f172a');
            } else {
                canvas.classList.remove('theme-dark');
                canvas.classList.add('theme-light');
                btn.innerHTML = '<span>🌙</span> 切换深色';
                document.documentElement.style.setProperty('--bg-main-light', '#ffffff');
            }
        }

        function toggleCropPreview() {
            const mask = document.getElementById('cropMask');
            const btn = document.getElementById('previewBtn');
            isPreviewOn = !isPreviewOn;

            if (isPreviewOn) {
                mask.style.display = 'block';
                btn.classList.add('active');
                btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> 关闭裁切预览';
            } else {
                mask.style.display = 'none';
                btn.classList.remove('active');
                btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h16v16H4z M4 12h16 M12 4v16"></path></svg> 1:1 裁切预览';
            }
        }

        async function downloadImage() {
            const canvasElement = document.getElementById('coverCanvas');
            const loading = document.getElementById('loading');

            // 导出前强制关闭预览遮罩并添加导出类名（停用动画以防模糊）
            const wasPreviewOn = isPreviewOn;
            if (isPreviewOn) toggleCropPreview();

            canvasElement.classList.add('exporting');
            loading.style.display = 'flex';

            try {
                // 等待一小会儿确保 CSS 状态更新完毕
                await new Promise(r => setTimeout(r, 100));

                const canvas = await html2canvas(canvasElement, {
                    scale: 2, // 2倍图，生成 1800x766 的高清图片
                    useCORS: true,
                    backgroundColor: isDark ? '#0f172a' : '#ffffff',
                    logging: false
                });

                const link = document.createElement('a');
                link.download = 'AI-Native-PM-Cover-Pro.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (error) {
                console.error("生成图片失败:", error);
                alert("生成图片失败，请稍后再试。");
            } finally {
                canvasElement.classList.remove('exporting');
                loading.style.display = 'none';
                // 如果原来开启了预览，导出后恢复
                if (wasPreviewOn) toggleCropPreview();
            }
        }
    </script>
</body>

</html>
